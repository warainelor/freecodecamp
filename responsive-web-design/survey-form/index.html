<!DOCTYPE html>
<html lang="en">
    <head>
        <title>freeCodeCamp Survey Form</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1 id="title">freeCodeCamp Survey Form</h1>
        <p id="description">Thank you for taking the time to help us improve the platform</p>
        <form id="survey-form">
            <label id="name-label" for="name">Name
                <input id="name" type="text" placeholder="Enter your name" required>
            </label>
            <label id="email-label" for="email">Email
                <input id="email" type="email" placeholder="Enter your Email" required>
            </label>
            <label id="number-label">Age (optional)
                <input id="number" type="number" min="1" max="100" placeholder="Age">
            </label>
            <label id="dropdown-label" for="dropdown">Which option best describes your current role?
                <select id="dropdown" name="role">
                    <option value="">Select current role</option>
                    <option value="student">Student</option>
                    <option value="full-time-job">Full Time Job</option>
                    <option value="full-time-learner">Full Time Learner</option>
                    <option value="prefer-not-to-say">Prefer not to say</option>
                    <option value="other">Other</option>
                </select>
            </label>
            <section id="recommendation">
                <p id="recommendation-question">Would you recommend freeCodeCamp to a friend?</p>
                <label for="definitely">
                    <input id="definitely" type="radio" value="definitely" name="recommendation" checked>
                </label>Definitely
                <label for="maybe">
                    <input id="maybe" type="radio" value="maybe" name="recommendation">
                </label>Maybe
                <label for="not-sure">
                    <input id="not-sure" type="radio" value="not-sure" name="recommendation">
                </label>Not sure
            </section>
            <section id="improvement">
                <p>What would you like to see improved? (Check all that apply)</p>
                <label for="front-end">
                    <input type="checkbox" id="front-end" name="front-end" value="front-end">
                </label>Front-end Projects
                <label for="back-end">
                    <input type="checkbox" id="back-end" name="back-end" value="back-end">
                </label>Back-end Projects
                <label for="data">
                    <input type="checkbox" id="data" name="data" value="data">
                </label>Data Visualization
            </section>
            <!-- <label for="comments"> -->
                <input type="textarea" id="comments" placeholder="Enter your comment here...">
                <textarea></textarea>
            <!-- </label> -->
            <input type="submit" id="submit" value="Submit">
        </form>
    </body>
</html>
